name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/damoang/angple-backend
  DISCORD_WEBHOOK_TOKEN_BACKEND: ${{ secrets.DISCORD_WEBHOOK_TOKEN_BACKEND }}

concurrency:
  group: deploy-main-backend
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      image_repo: ${{ env.IMAGE_NAME }}-api
      image_digest: ${{ steps.build_api.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push API
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/api.Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}-api:${{ steps.tags.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/gateway.Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}-gateway:${{ steps.tags.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}-gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  deploy-canary:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: canary
      url: https://canary.damoang.net/api/v1/health
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ap-northeast-2

      - name: Deploy canary via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters "{
              \"commands\": [
                \"export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}' TELEGRAM_DEPLOY_CHAT_ID='${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}' && /home/angple/k8s/prod/deploy.sh backend $IMAGE_TAG --canary-only\"
              ]
            }" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text 2>&1)
          
          if [ -z "$COMMAND_ID" ] || [[ "$COMMAND_ID" == *"error"* ]]; then
            echo "❌ SSM send-command failed: $COMMAND_ID"
            exit 1
          fi
          
          echo "SSM Command ID: $COMMAND_ID"


          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Backend canary deployed"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timeout"
          exit 1

      - name: Smoke test
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -A "GitHub-Actions-Healthcheck" https://canary.damoang.net/api/v1/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Canary healthy"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Canary failed (Status: $STATUS)"
          exit 1

      - name: Notify Discord (Canary)
        if: always() && env.DISCORD_WEBHOOK_TOKEN_BACKEND != ''
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
          curl -X POST "https://discord.com/api/webhooks/1449348482673672286/${{ secrets.DISCORD_WEBHOOK_TOKEN_BACKEND }}" -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"🚀 Backend Canary $STATUS\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Tag\", \"value\": \"\`${{ needs.build.outputs.sha_tag }}\`\"}
              ]
            }]
          }"

  verify-canary:
    needs: [build, deploy-canary]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ap-northeast-2

      - name: Verify canary endpoints (via SSM)
        run: |
          cat > /tmp/backend-canary-verify-params.json <<'JSON'
          {
            "commands": [
              "set -eu",
              "BASE='http://127.0.0.1:30083'",
              "for i in 1 2 3 4 5 6; do",
              "  echo \"VERIFY ROUND ${i}\"",
              "  code=$(curl -sS -o /tmp/backend-canary-health.out -w \"%{http_code}\" --max-time 10 \"${BASE}/health\")",
              "  echo \"CHECK /health -> ${code}\"",
              "  [ \"${code}\" = \"200\" ] || { cat /tmp/backend-canary-health.out; exit 1; }",
              "  code=$(curl -sS -o /tmp/backend-canary-posts.out -w \"%{http_code}\" --max-time 10 \"${BASE}/api/v1/boards/free/posts?page=1&limit=5\")",
              "  echo \"CHECK /api/v1/boards/free/posts?page=1&limit=5 -> ${code}\"",
              "  [ \"${code}\" = \"200\" ] || { cat /tmp/backend-canary-posts.out; exit 1; }",
              "  grep -q '\"data\"' /tmp/backend-canary-posts.out || { cat /tmp/backend-canary-posts.out; exit 1; }",
              "  echo \"MATCH /api/v1/boards/free/posts?page=1&limit=5 -> \\\"data\\\"\"",
              "  sleep 5",
              "done"
            ]
          }
          JSON

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/backend-canary-verify-params.json \
            --timeout-seconds 180 \
            --query "Command.CommandId" \
            --output text)

          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Canary verification passed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text || true
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "❌ Canary verification failed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text || true
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text || true
              exit 1
            fi
            sleep 5
          done
          echo "Timeout"
          exit 1

      - name: Notify Telegram (Approval)
        if: success()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}" \
            -d "text=✅ angple backend canary verified%0A%0ARepo: ${{ github.repository }}%0ACommit: ${{ github.sha }}%0ATag: \`${{ needs.build.outputs.sha_tag }}\`%0ADigest: \`${{ needs.build.outputs.image_digest }}\`%0ACanary: https://canary.damoang.net/api/v1/health%0AGate Approval: ${RUN_URL}%0A%0ACanary 검증 통과 후 Environment approval 을 하면 production 배포가 진행됩니다." \
            -d "reply_markup={\"inline_keyboard\":[[{\"text\":\"Canary 열기\",\"url\":\"https://canary.damoang.net/api/v1/health\"},{\"text\":\"Gate Approval\",\"url\":\"${RUN_URL}\"}]]}"

  deploy-production:
    needs: [build, deploy-canary, verify-canary]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://damoang.net/api/health
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ap-northeast-2

      - name: Deploy production via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters "{
              \"commands\": [
                \"export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}' TELEGRAM_DEPLOY_CHAT_ID='${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}' && /home/angple/k8s/prod/deploy.sh backend $IMAGE_TAG --skip-canary\"
              ]
            }" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text 2>&1)
          
          if [ -z "$COMMAND_ID" ] || [[ "$COMMAND_ID" == *"error"* ]]; then
            echo "❌ SSM send-command failed: $COMMAND_ID"
            exit 1
          fi
          
          echo "SSM Command ID: $COMMAND_ID"


          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Backend production deployed"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timeout"
          exit 1

      - name: Notify Discord (Production)
        if: always() && env.DISCORD_WEBHOOK_TOKEN_BACKEND != ''
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
          curl -X POST "https://discord.com/api/webhooks/1449348482673672286/${{ secrets.DISCORD_WEBHOOK_TOKEN_BACKEND }}" -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"🎉 Backend Production $STATUS\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Tag\", \"value\": \"\`${{ needs.build.outputs.sha_tag }}\`\"}
              ]
            }]
          }"

      - name: Notify Telegram (Production)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "🎉" || echo "❌")
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}" \
            -d "text=${EMOJI} angple backend production ${STATUS}%0A%0ATag: \`${{ needs.build.outputs.sha_tag }}\`%0ADigest: \`${{ needs.build.outputs.image_digest }}\`%0AURL: https://damoang.net/api/health"
