version: "2"
run:
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - bodyclose
    - dupl
    - errorlint
    - goconst
    - gocyclo
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
    goconst:
      min-len: 3
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G204
    govet:
      disable:
        - shadow
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - dupl
          - errcheck
          - goconst
          - gocyclo
          - revive
        path: cmd/.*main\.go
      - linters:
          - errorlint
        path: cmd/migrate-.*\.go
      - linters:
          - revive
        path: internal/domain/v2/.*\.go
        text: stutters
      - linters:
          - goconst
          - gocyclo
          - gosec
        path: internal/domain/v2/nariya_php\.go
      - linters:
          - errcheck
        path: internal/cron/.*\.go
      - linters:
          - errcheck
        path: internal/service/.*\.go
      - linters:
          - errcheck
        path: pkg/sphinx/.*\.go
      - linters:
          - dupl
          - errcheck
          - goconst
          - gosec
        path: internal/dantry/.*\.go
      - linters:
          - errcheck
        path: internal/handler/.*\.go
      - linters:
          - errcheck
          - revive
        path: internal/handler/v2/.*\.go
        text: stutters|Error return value
      - linters:
          - gocyclo
        path: internal/handler/v2/.*\.go
      - linters:
          - gocyclo
          - gosec
        path: internal/middleware/.*\.go
      - linters:
          - revive
        path: internal/common/.*\.go
        text: unused-parameter
      - linters:
          - errcheck
        path: internal/config/.*\.go
      - linters:
          - revive
        path: internal/migration/.*\.go
      - linters:
          - revive
        path: internal/domain/gnuboard/member\.go
        text: var-naming
      - linters:
          - prealloc
        path: internal/repository/gnuboard/mypage_repo\.go
      - linters:
          - dupl
        path: internal/repository/.*\.go
      - linters:
          - dupl
        path: internal/handler/.*\.go
      - linters:
          - dupl
        path: internal/middleware/.*\.go
      - linters:
          - revive
        path: internal/plugin/types\.go
        text: stutters
      - linters:
          - gocyclo
          - revive
        path: internal/plugin/manager\.go
        text: stutters|registerPluginMenus
      - linters:
          - dupl
          - errcheck
          - errorlint
          - goconst
          - gocyclo
          - gosec
          - misspell
          - prealloc
          - revive
          - staticcheck
        path: internal/plugins/commerce/.*\.go
      - linters:
          - dupl
          - errcheck
          - gocyclo
        path: internal/plugins/marketplace/.*\.go
      - linters:
          - errcheck
          - revive
        path: internal/plugins/commerce/carrier/.*\.go
      - linters:
          - errcheck
          - goconst
          - revive
        path: internal/plugins/commerce/gateway/.*\.go
      - linters:
          - dupl
        path: internal/plugins/commerce/handler/.*\.go
    paths:
      - .*\.pb\.go$
      - plugins
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - plugins
      - third_party$
      - builtin$
      - examples$
